<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Minopex - Global Mining Operations & Maintenance</title>
    <meta name="description" content="Leading global mining plant operations and maintenance specialists. 2,000+ employees across 14+ countries with 30+ years of experience." />
    <meta name="keywords" content="mining operations, plant maintenance, mining services, DRA Global" />
    <meta name="theme-color" content="#1e3a5f" />
  </head>

  <body dir="ltr">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Initialize language from localStorage
      const lang = localStorage.getItem('language') || 'en';
      const isRTL = lang === 'ar';
      document.documentElement.lang = lang;
      document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
      if (isRTL) {
        document.documentElement.classList.add('rtl');
      }
    </script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
